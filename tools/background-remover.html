<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Background Remover - Toolcas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-bg { background-color: #0b0f19; }
        .upload-zone { border: 2px dashed #374151; transition: all 0.3s ease; }
        .upload-zone:hover { border-color: #6366f1; background-color: rgba(17, 24, 39, 0.5); }
    </style>
    <script type="application/ld+json" id="faq-schema"></script>
</head>
<body class="glow-bg text-gray-100 font-sans antialiased relative min-h-screen">

    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[500px] pointer-events-none overflow-hidden opacity-20 z-0">
        <div class="absolute top-[-10%] left-[30%] w-[500px] h-[500px] bg-indigo-600 rounded-full blur-[130px]"></div>
    </div>

    <header class="relative z-10 border-b border-gray-800/80 bg-[#0b0f19]/70 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="../index.html" class="text-2xl font-black tracking-tight text-white bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                TOOLCAS
            </a>
            <nav class="space-x-6 text-sm font-medium text-gray-400">
                <a href="../index.html" id="nav-home" class="hover:text-white transition-colors">Home</a>
                <a href="../index.html#tools" id="nav-all-tools" class="hover:text-white transition-colors">All Tools</a>
            </nav>
        </div>
    </header>

    <main class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-16">
        <div class="text-center mb-12">
            <h1 id="tool-title" class="text-3xl sm:text-5xl font-extrabold text-white mb-4 tracking-tight"></h1>
            <p id="tool-desc" class="text-base text-gray-400 max-w-2xl mx-auto"></p>
        </div>

        <section class="max-w-3xl mx-auto mb-16">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-box" class="upload-zone rounded-2xl p-12 cursor-pointer bg-gray-900/20 text-center">
                <div class="text-5xl mb-4">📁</div>
                <p id="upload-text" class="text-sm font-medium text-gray-300"></p>
                <p id="upload-sub" class="text-xs text-gray-500 mt-2"></p>
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-2 gap-12 border-t border-gray-900 pt-12 mb-16">
            <div>
                <h2 id="how-to-title" class="text-xl font-bold text-white mb-4"></h2>
                <ol id="how-to-steps" class="space-y-3 text-sm text-gray-400 list-decimal list-inside"></ol>
            </div>
            <div>
                <h2 id="features-title" class="text-xl font-bold text-white mb-4"></h2>
                <ul id="features-list" class="space-y-3 text-sm text-gray-400 list-disc list-inside"></ul>
            </div>
        </section>

        <section class="border-t border-gray-900 pt-12 mb-16">
            <h2 id="seo-content-title" class="text-2xl font-bold text-white mb-6"></h2>
            <div id="seo-content-body" class="text-sm text-gray-400 leading-relaxed space-y-4"></div>
        </section>

        <section id="faq-section" class="border-t border-gray-900 pt-12">
            <h2 id="faq-section-title" class="text-2xl font-bold text-white mb-8 text-center"></h2>
            <div id="faq-container" class="space-y-4 max-w-3xl mx-auto"></div>
        </section>
    </main>

    <footer class="border-t border-gray-900 bg-[#070a12] text-xs text-gray-500 py-8 text-center relative z-10">
        &copy; 2026 Toolcas Inc. All rights reserved.
    </footer>

    <script>
        const localizations = {
            tr: {
                navHome: 'Ana Sayfa', navAllTools: 'Tüm Araçlar',
                title: 'AI Arka Plan Silici',
                desc: 'Gelişmiş yapay zeka kullanarak görsellerinizin arka planını anında ve otomatik olarak kaldırın.',
                upload: 'Görselinizi buraya sürükleyip bırakın veya <span class="text-indigo-400">göz atın</span>',
                uploadSub: '10MB\'a kadar PNG, JPG, WEBP destekler',
                howTo: 'Nasıl Kullanılır?',
                steps: ['Fotoğrafınızı sisteme yükleyin.', 'Yapay zeka arka planı otomatik olarak algılayıp silecektir.', 'Şeffaf PNG görselinizi anında indirin.'],
                features: 'Öne Çıkan Özellikler',
                featList: ['%100 otomatik ve son derece hızlı sonuç.', 'Saç telleri ve karmaşık kenarlarda yüksek hassasiyetli kesim.', 'Orijinal görsel çözünürlüğünü tamamen korur.'],
                seoTitle: 'AI Arka Plan Silici Hakkında',
                seoBody: '<p>Yapay zeka destekli aracımız, temiz ve profesyonel kesimler arayan içerik üreticileri, tasarımcılar ve e-ticaret siteleri için endüstriyel standartta çözümler sunar.</p>',
                faqTitle: 'Sıkça Sorulan Sorular',
                faqs: [
                    { q: 'Bu araç tamamen ücretsiz mi?', a: 'Evet, arka plan silme aracımızı hiçbir gizli ücret ödemeden tamamen ücretsiz kullanabilirsiniz.' },
                    { q: 'Yapay zeka bu işlemi nasıl yapıyor?', a: 'Ön plandaki nesneleri arka plandan ayırt etmek üzere eğitilmiş derin öğrenme tabanlı görsel modelleri kullanır.' },
                    { q: 'Görsellerim güvende mi?', a: 'Kesinlikle. Yüklediğiniz dosyaları hiçbir şekilde sunucularımızda tutmuyoruz.' },
                    { q: 'Çıktıları ticari amaçla kullanabilir miyim?', a: 'Evet, Toolcas üzerinden işlediğiniz tüm görsellerin tam telif hakkı size aittir.' },
                    { q: 'Toplu yükleme desteği var mı?', a: 'Şu an için tüm kullanıcılara eşit hız sağlamak adına görseller tek tek işlenmektedir.' },
                    { q: 'Hangi dosya formatları destekleniyor?', a: 'Standart web formatları olan PNG, JPG, JPEG ve WEBP dosyalarını destekliyoruz.' },
                    { q: 'Dosya boyutu sınırı var mı?', a: 'Evet, tek seferde yükleyebileceğiniz maksimum dosya boyutu 10MB ile sınırlıdır.' }
                ]
            }
        };

        function renderPageData() {
            const data = localizations.tr;
            document.getElementById('tool-title').innerText = data.title;
            document.getElementById('tool-desc').innerText = data.desc;
            document.getElementById('upload-text').innerHTML = data.upload;
            document.getElementById('upload-sub').innerText = data.uploadSub;
            document.getElementById('how-to-title').innerText = data.howTo;
            document.getElementById('features-title').innerText = data.features;
            document.getElementById('seo-content-title').innerText = data.seoTitle;
            document.getElementById('seo-content-body').innerHTML = data.seoBody;
            document.getElementById('faq-section-title').innerText = data.faqTitle;
            
            const stepsContainer = document.getElementById('how-to-steps');
            data.steps.forEach(step => stepsContainer.innerHTML += `<li>${step}</li>`);
            const featContainer = document.getElementById('features-list');
            data.featList.forEach(feat => featContainer.innerHTML += `<li>${feat}</li>`);

            const faqContainer = document.getElementById('faq-container');
            data.faqs.forEach((faq, index) => {
                faqContainer.innerHTML += `
                    <div class="bg-gray-900/30 border border-gray-800 rounded-xl overflow-hidden cursor-pointer shadow-sm mb-4" onclick="toggleFaqDetail(${index})">
                        <div class="p-5 flex justify-between items-center select-none">
                            <h3 class="text-sm font-semibold text-white">Q: ${faq.q}</h3>
                            <span id="faq-arr-${index}" class="text-xs text-gray-500 transition-transform duration-200">▼</span>
                        </div>
                        <div id="faq-answer-${index}" class="px-5 pb-5 pt-1 border-t border-gray-800/40 bg-gray-900/10 hidden">
                            <p class="text-xs text-gray-400 mt-2">${faq.a}</p>
                        </div>
                    </div>`;
            });
        }

        function toggleFaqDetail(index) {
            document.getElementById(`faq-answer-${index}`).classList.toggle('hidden');
            document.getElementById(`faq-arr-${index}`).classList.toggle('rotate-180');
        }

        const uploadBox = document.getElementById('upload-box');
        const fileInput = document.getElementById('file-input');
        uploadBox.addEventListener('click', () => fileInput.click());

        renderPageData();
    </script>
</body>
</html>
