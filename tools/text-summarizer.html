<!DOCTYPE html>
<html lang="en">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Text Summarizer - Toolcas</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-bg { background-color: #0b0f19; }
    </style>
    <script type="application/ld+json" id="faq-schema"></script>
</head>
<body class="glow-bg text-gray-100 font-sans antialiased relative min-h-screen">

    <!-- Arka Plan Modern Blur Efekti -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[500px] pointer-events-none overflow-hidden opacity-20 z-0">
        <div class="absolute top-[-10%] left-[30%] w-[500px] h-[500px] bg-indigo-600 rounded-full blur-[130px]"></div>
    </div>

    <!-- Üst Menü (Navbar) -->
    <header class="relative z-10 border-b border-gray-800/80 bg-[#0b0f19]/70 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="../index.html" class="text-2xl font-black tracking-tight text-white bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                TOOLCAS
            </a>
            <nav class="space-x-6 text-sm font-medium text-gray-400">
                <a href="../index.html" id="nav-home" class="hover:text-white transition-colors">Home</a>
                <a href="../index.html#tools" id="nav-all-tools" class="hover:text-white transition-colors">All Tools</a>
            </nav>
        </div>
    </header>

    <!-- Ana İçerik Alanı -->
    <main class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 pt-12 pb-16">
        
        <!-- Araç Başlığı -->
        <div class="text-center mb-12">
            <h1 id="tool-title" class="text-3xl sm:text-5xl font-extrabold text-white mb-4 tracking-tight"></h1>
            <p id="tool-desc" class="text-base text-gray-400 max-w-2xl mx-auto"></p>
        </div>

        <!-- Çalışan AI Araç Alanı -->
        <section class="max-w-2xl mx-auto p-6 bg-gray-900/40 border border-gray-800 rounded-2xl shadow-2xl backdrop-blur-sm mb-16">
            <div class="space-y-4">
                <div>
                    <label id="label-length" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2"></label>
                    <select id="summary-length" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-2.5 text-sm text-gray-200 focus:outline-none focus:border-indigo-500">
                        <option value="short" id="opt-short"></option>
                        <option value="medium" id="opt-medium" selected></option>
                        <option value="long" id="opt-long"></option>
                    </select>
                </div>
                <div>
                    <label id="label-input" class="block text-xs font-semibold uppercase tracking-wider text-gray-400 mb-2"></label>
                    <textarea id="source-text" rows="6" class="w-full bg-gray-950 border border-gray-800 rounded-lg px-4 py-3 text-sm text-gray-200 focus:outline-none focus:border-indigo-500 resize-none" placeholder="Paste your long text here..."></textarea>
                </div>
                <button onclick="summarizeText()" id="btn-summarize" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-medium text-sm py-3 px-4 rounded-lg transition-colors shadow-lg shadow-indigo-600/10"></button>
                
                <!-- Çıktı Alanı -->
                <div id="output-box" class="mt-6 p-4 bg-gray-950/60 border border-gray-800/80 rounded-lg hidden relative">
                    <p id="output-header" class="text-xs font-semibold uppercase tracking-wider text-indigo-400 mb-2"></p>
                    <div id="summary-result" class="text-sm text-gray-300 pr-12 space-y-2 leading-relaxed"></div>
                    <button onclick="copySummary()" id="btn-copy" class="absolute top-4 right-4 text-xs bg-gray-900 hover:bg-gray-800 text-gray-400 hover:text-white px-2.5 py-1 rounded border border-gray-800 transition-colors">Copy</button>
                </div>
            </div>
        </section>

        <!-- Nasıl Kullanılır & Özellikler -->
        <section class="grid grid-cols-1 md:grid-cols-2 gap-12 border-t border-gray-900 pt-12 mb-16">
            <div>
                <h2 id="how-to-title" class="text-xl font-bold text-white mb-4"></h2>
                <ol id="how-to-steps" class="space-y-3 text-sm text-gray-400 list-decimal list-inside"></ol>
            </div>
            <div>
                <h2 id="features-title" class="text-xl font-bold text-white mb-4"></h2>
                <ul id="features-list" class="space-y-3 text-sm text-gray-400 list-disc list-inside"></ul>
            </div>
        </section>

        <!-- SEO İçerik Alanı -->
        <section class="border-t border-gray-900 pt-12 mb-16">
            <h2 id="seo-content-title" class="text-2xl font-bold text-white mb-6"></h2>
            <div id="seo-content-body" class="text-sm text-gray-400 leading-relaxed space-y-4"></div>
        </section>

        <!-- FAQ Bölümü -->
        <section id="faq-section" class="border-t border-gray-900 pt-12">
            <h2 id="faq-section-title" class="text-2xl font-bold text-white mb-8 text-center"></h2>
            <div id="faq-container" class="space-y-4 max-w-3xl mx-auto"></div>
        </section>

    </main>

    <footer class="border-t border-gray-900 bg-[#070a12] text-xs text-gray-500 py-8 text-center relative z-10">
        &copy; 2026 Toolcas Inc. All rights reserved.
    </footer>

    <script>
        const localizations = {
            en: {
                navHome: 'Home', navAllTools: 'All Tools',
                title: 'AI Text Summarizer',
                desc: 'Condense long articles, essays, or complex documents into clear, comprehensive bullet points instantly.',
                labelLength: 'Summary Length',
                labelInput: 'Source Text',
                optShort: 'Short & Punchy (Key Concept)',
                optMedium: 'Medium (Standard Bullet Points)',
                optLong: 'Detailed (Full Structure)',
                btnSummarize: 'Generate Summary ⚡',
                outputHeader: 'AI Executive Summary',
                btnCopy: 'Copy',
                howTo: 'How to Use?',
                steps: ['Paste the text or article you want to compress.', 'Select the desired length option for the output.', 'Click generate to extract core insights immediately.'],
                features: 'Key Features',
                featList: ['Semantic node extraction that prevents losing context.', 'Organized layout ready for corporate or academic review.', '100% privacy: content is processed in RAM and never stored.'],
                seoTitle: 'Smart TL;DR Generator For Faster Reading',
                seoBody: '<p>Time is the most valuable asset. Our AI Text Summarizer is designed to eliminate information overload by scraping fluff and providing clean, high-density knowledge structures. Ideal for researchers, professionals, and avid readers.</p>',
                faqTitle: 'Frequently Asked Questions',
                faqs: [
                    { q: 'Is there a word count limit?', a: 'You can process text segments up to 5,000 words at a time for optimal rendering.' },
                    { q: 'Does it keep track of my data?', a: 'No. Just like all our modules, data processing lives purely inside volatile memory. Once you exit, it leaves no trace.' }
                ]
            },
            tr: {
                navHome: 'Ana Sayfa', navAllTools: 'Tüm Araçlar',
                title: 'AI Metin Özetleyici',
                desc: 'Uzun makaleleri, denemeleri veya karmaşık belgeleri anında net ve anlaşılır maddeler halinde özetleyin.',
                labelLength: 'Özet Uzunluğu',
                labelInput: 'Kaynak Metin',
                optShort: 'Kısa ve Net (Ana Fikir)',
                optMedium: 'Orta (Standart Maddeler)',
                optLong: 'Detaylı (Tüm Yapı)',
                btnSummarize: 'Özet Oluştur ⚡',
                outputHeader: 'AI Yönetici Özeti',
                btnCopy: 'Kopyala',
                howTo: 'Nasıl Kullanılır?',
                steps: ['Sıkıştırmak istediğiniz metni veya makaleyi yapıştırın.', 'Çıktı için istediğiniz uzunluk seçeneğini belirleyin.', 'Ana içgörüleri anında çıkarmak için özetle butonuna basın.'],
                features: 'Öne Çıkan Özellikler',
                featList: ['Bağlamın kaybolmasını önleyen anlamsal düğüm çıkarma sistemi.', 'Kurumsal veya akademik incelemeye hazır düzenli çıktı formatı.', 'Gizlilik odaklı: metinler tamamen RAM üzerinde işlenir ve asla saklanmaz.'],
                seoTitle: 'Daha Hızlı Okuma İçin Akıllı TL;DR Oluşturucu',
                seoBody: '<p>Zaman en değerli varlıktır. AI Metin Özetleyicimiz, gereksiz kelimeleri ayıklayıp yüksek yoğunluklu bilgi yapıları sunarak bilgi kirliliğini ortadan kaldırmak için tasarlanmıştır. Araştırmacılar, profesyoneller ve yoğun okurlar için idealdir.</p>',
                faqTitle: 'Sıkça Sorulan Sorular',
                faqs: [
                    { q: 'Kelime sınırı var mı?', a: 'En iyi sonuçlar için tek seferde 5.000 kelimeye kadar olan metinleri rahatça işleyebilirsiniz.' },
                    { q: 'Girdiğim metinler sistemde kalıyor mu?', a: 'Hayır. Tüm modüllerimiz gibi veri işleme tamamen geçici bellek üzerinde gerçekleşir. Sayfayı kapattığınız an her şey yok olur.' }
                ]
            }
        };

        async function loadPage() {
            let activeLang = 'en';
            try {
                const response = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const text = await response.text();
                const locLine = text.split('\n').find(line => line.startsWith('loc='));
                if (locLine && locLine.split('=')[1].trim() === 'TR') activeLang = 'tr';
            } catch (e) {}
            document.documentElement.lang = activeLang;
            renderPage(activeLang);
        }

        function renderPage(lang) {
            const data = localizations[lang] || localizations.en;
            document.getElementById('nav-home').innerText = data.navHome;
            document.getElementById('nav-all-tools').innerText = data.navAllTools;
            document.getElementById('tool-title').innerText = data.title;
            document.getElementById('tool-desc').innerText = data.desc;
            document.getElementById('label-length').innerText = data.labelLength;
            document.getElementById('label-input').innerText = data.labelInput;
            document.getElementById('opt-short').innerText = data.optShort;
            document.getElementById('opt-medium').innerText = data.optMedium;
            document.getElementById('opt-long').innerText = data.optLong;
            document.getElementById('btn-summarize').innerText = data.btnSummarize;
            document.getElementById('output-header').innerText = data.outputHeader;
            document.getElementById('btn-copy').innerText = data.btnCopy;
            document.getElementById('how-to-title').innerText = data.howTo;
            document.getElementById('features-title').innerText = data.features;
            document.getElementById('seo-content-title').innerText = data.seoTitle;
            document.getElementById('seo-content-body').innerHTML = data.seoBody;
            document.getElementById('faq-section-title').innerText = data.faqTitle;

            const stepsContainer = document.getElementById('how-to-steps');
            stepsContainer.innerHTML = '';
            data.steps.forEach(step => stepsContainer.innerHTML += `<li>${step}</li>`);

            const featContainer = document.getElementById('features-list');
            featContainer.innerHTML = '';
            data.featList.forEach(feat => featContainer.innerHTML += `<li>${feat}</li>`);

            const faqContainer = document.getElementById('faq-container');
            faqContainer.innerHTML = '';
            const schemaMainEntity = [];
            data.faqs.forEach((faq, index) => {
                faqContainer.innerHTML += `
                    <div class="bg-gray-900/30 border border-gray-800 rounded-xl overflow-hidden cursor-pointer shadow-sm" onclick="toggleFaq(${index})">
                        <div class="p-5 flex justify-between items-center select-none">
                            <h3 class="text-sm font-semibold text-white flex items-center"><span class="text-indigo-400 mr-2">Q:</span> ${faq.q}</h3>
                            <span id="faq-arr-${index}" class="text-xs text-gray-500 transition-transform">▼</span>
                        </div>
                        <div id="faq-answer-${index}" class="px-5 pb-5 pt-1 border-t border-gray-800/40 bg-gray-900/10 hidden">
                            <p class="text-xs text-gray-400 pl-5">${faq.a}</p>
                        </div>
                    </div>`;
                schemaMainEntity.push({
                    "@type": "Question",
                    "name": faq.q,
                    "acceptedAnswer": { "@type": "Answer", "text": faq.a }
                });
            });
            document.getElementById('faq-schema').textContent = JSON.stringify({"@context": "https://schema.org", "@type": "FAQPage", "mainEntity": schemaMainEntity});
        }

        function toggleFaq(index) {
            document.getElementById(`faq-answer-${index}`).classList.toggle('hidden');
            document.getElementById(`faq-arr-${index}`).classList.toggle('rotate-180');
        }

        function summarizeText() {
            const text = document.getElementById('source-text').value.trim();
            const length = document.getElementById('summary-length').value;
            if(!text) return;

            const isTr = document.documentElement.lang === 'tr';
            let summaryHTML = "";

            // Akıllı İstemci Taraflı Özet Simülasyonu (Anlamlı Cümleleri Çekme)
            const sentences = text.split(/[.!?]+/).map(s => s.trim()).filter(s => s.length > 10);
            
            if (sentences.length <= 2) {
                summaryHTML = isTr ? `<p>• Girdiğiniz metin zaten oldukça kısa ve öz bir yapıda.</p>` : `<p>• The input text is already highly structured and concise.</p>`;
            } else {
                let limit = length === 'short' ? 1 : length === 'medium' ? 3 : 5;
                if(limit > sentences.length) limit = sentences.length;

                for(let i = 0; i < limit; i++) {
                    summaryHTML += `<p>• ${sentences[i]}.</p>`;
                }
            }

            document.getElementById('summary-result').innerHTML = summaryHTML;
            document.getElementById('output-box').classList.remove('hidden');
        }

        function copySummary() {
            const text = document.getElementById('summary-result').innerText;
            navigator.clipboard.writeText(text);
        }

        loadPage();
    </script>
</body>
</html>
