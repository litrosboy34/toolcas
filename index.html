<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toolcas - Free AI Tools Platform</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-bg { background-color: #0b0f19; }
    </style>
</head>
<body class="glow-bg text-gray-100 font-sans antialiased relative min-h-screen">

    <!-- Arka Plan Modern Blur Efektleri -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[600px] pointer-events-none overflow-hidden opacity-20 z-0">
        <div class="absolute top-[-10%] left-[20%] w-[600px] h-[600px] bg-indigo-600 rounded-full blur-[150px]"></div>
        <div class="absolute top-[-5%] right-[20%] w-[400px] h-[400px] bg-purple-600 rounded-full blur-[130px]"></div>
    </div>

    <!-- Üst Menü (Navbar) -->
    <header class="relative z-10 border-b border-gray-800/80 bg-[#0b0f19]/70 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <a href="index.html" class="text-2xl font-black tracking-tight text-white bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                    TOOLCAS
                </a>
                <span class="px-2 py-0.5 text-[10px] font-medium bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 rounded-full uppercase">AI</span>
            </div>
            <nav class="hidden md:flex space-x-8 text-sm font-medium text-gray-400">
                <a href="#tools" id="nav-tools" class="hover:text-white transition-colors">Tools</a>
                <a href="#categories" id="nav-categories" class="hover:text-white transition-colors">Categories</a>
                <a href="#faq" id="nav-faq" class="hover:text-white transition-colors">FAQ</a>
                <a href="blog/index.html" id="nav-blog" class="hover:text-white transition-colors">Blog</a>
            </nav>
            <div>
                <button class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded-lg hover:bg-indigo-500 shadow-lg shadow-indigo-600/20 transition-all">Launch App</button>
            </div>
        </div>
    </header>

    <!-- Ana Sayfa İçeriği -->
    <main class="relative z-10 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-20 pb-16">
        
        <!-- Büyük Hero Alanı -->
        <div class="text-center max-w-3xl mx-auto">
            <h1 id="hero-title" class="text-4xl sm:text-6xl font-extrabold tracking-tight text-white mb-6 leading-tight"></h1>
            <p id="hero-sub" class="text-lg text-gray-400 mb-10 max-w-2xl mx-auto font-normal"></p>

            <!-- Devasa Akıllı Arama Kutusu -->
            <div class="relative max-w-2xl mx-auto p-1.5 bg-gray-900/60 border border-gray-800 rounded-2xl shadow-2xl backdrop-blur-sm focus-within:border-indigo-500/50 transition-all">
                <div class="flex items-center">
                    <div class="pl-3 pr-2 text-gray-500">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    </div>
                    <input type="text" id="search-input" class="w-full bg-transparent border-none text-white placeholder-gray-500 focus:outline-none text-base py-3 px-2"/>
                </div>
            </div>
        </div>

        <!-- Popüler AI Araçları -->
        <section id="tools" class="mt-28">
            <h2 id="section-tools-title" class="text-2xl font-bold tracking-tight text-white mb-8"></h2>
            <div id="tools-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
            <p id="no-results" class="text-center text-gray-500 py-12 hidden"></p>
        </section>

        <!-- Kategoriler -->
        <section id="categories" class="mt-24">
            <h2 id="section-cats-title" class="text-2xl font-bold tracking-tight text-white mb-8 text-center"></h2>
            <div id="categories-grid" class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-6 gap-4"></div>
        </section>

        <!-- Sık Sorulan Sorular -->
        <section id="faq" class="mt-28 max-w-4xl mx-auto">
            <h2 id="section-faq-title" class="text-2xl font-bold tracking-tight text-white mb-10 text-center"></h2>
            <div id="faq-container" class="space-y-4"></div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-900 bg-[#070a12] mt-32 relative z-10 text-xs text-gray-500">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col sm:flex-row items-center justify-between gap-4">
            <div>&copy; 2026 Toolcas Inc. All rights reserved.</div>
            <div class="flex space-x-6">
                <a href="privacy/index.html" class="hover:text-gray-300">Privacy Policy</a>
                <a href="terms/index.html" class="hover:text-gray-300">Terms of Service</a>
            </div>
        </div>
    </footer>

    <!-- DİL VE ÇALIŞMA SCRIPT MOTORU -->
    <script>
        const languages = {
            en: {
                heroTitle: 'Discover the Power of AI with One Click',
                heroSub: 'Access hundreds of AI tools for free, unlimited, and fast from a single platform with Toolcas.',
                searchPlaceholder: 'Which AI tool do you need? (e.g., Background remover...)',
                toolsTitle: 'Popular AI Tools',
                catsTitle: 'Browse Categories',
                faqTitle: 'Frequently Asked Questions',
                noResults: 'No tools found matching your criteria.'
            },
            tr: {
                heroTitle: 'Yapay Zekanın Gücünü Tek Tıkla Keşfedin',
                heroSub: 'Toolcas ile yüzlerce yapay zeka aracına tek bir platformdan ücretsiz, sınırsız ve hızlıca erişin.',
                searchPlaceholder: 'Hangi AI aracına ihtiyacınız var? (Örn: Arka plan silme...)',
                toolsTitle: 'Popüler AI Araçları',
                catsTitle: 'Kategorilere Göz Atın',
                faqTitle: 'Sıkça Sorulan Sorular',
                noResults: 'Aradığınız kriterlere uygun araç bulunamadı.'
            },
            de: {
                heroTitle: 'Entdecken Sie die Kraft der KI mit einem Klick',
                heroSub: 'Greifen Sie mit Toolcas kostenlos, unbegrenzt und schnell auf Hunderte von KI-Tools zu.',
                searchPlaceholder: 'Welches KI-Tool benötigen Sie?',
                toolsTitle: 'Beliebte KI-Tools',
                catsTitle: 'Kategorien durchsuchen',
                faqTitle: 'Häufig gestellte Fragen',
                noResults: 'Keine Tools gefunden.'
            },
            es: {
                heroTitle: 'Descubre el Poder de la IA con un Solo Clic',
                heroSub: 'Acceda a cientos de herramientas de IA de forma gratuita, ilimitada y rápida con Toolcas.',
                searchPlaceholder: '¿Qué herramienta de IA necesitas?',
                toolsTitle: 'Herramientas de IA Populares',
                catsTitle: 'Examinar Categorías',
                faqTitle: 'Preguntas Frecuentes',
                noResults: 'No se encontraron herramientas.'
            },
            fr: {
                heroTitle: 'Découvrez la puissance de l\'IA en un clic',
                heroSub: 'Accédez à des centaines d\'outils d\'IA gratuitement, en illimité et rapidement avec Toolcas.',
                searchPlaceholder: 'De quel outil d\'IA avez-vous besoin ?',
                toolsTitle: 'Outils d\'IA Populaires',
                catsTitle: 'Parcourir les Catégories',
                faqTitle: 'Foire Aux Questions',
                noResults: 'Aucun outil trouvé.'
            }
        };

        const countryToLangMap = { 'TR': 'tr', 'DE': 'de', 'ES': 'es', 'FR': 'fr' };

        const toolsData = [
            { name: 'Background Remover', slug: 'background-remover', desc: 'Remove backgrounds from images instantly.', icon: '✂️' },
            { name: 'AI Image Generator', slug: 'ai-image-generator', desc: 'Create beautiful images from text prompts.', icon: '🎨' },
            { name: 'AI Content Writer', slug: 'ai-content-writer', desc: 'Generate high-quality articles in seconds.', icon: '📝' },
            { name: 'PDF Summarizer', slug: 'pdf-summarizer', desc: 'Summarize long PDF documents using AI.', icon: '📊' }
        ];

        const categoriesData = [
            { name: 'AI Writing', count: 12, icon: '✍️' },
            { name: 'AI Image', count: 18, icon: '🖼️' },
            { name: 'AI Video', count: 8, icon: '🎥' },
            { name: 'AI Audio', count: 6, icon: '🎵' },
            { name: 'AI PDF', count: 15, icon: '📄' },
            { name: 'AI Coding', count: 10, icon: '💻' }
        ];

        const faqData = [
            { q: 'Toolcas tamamen ücretsiz mi?', a: 'Evet, platformumuzdaki temel tüm araçları herhangi bir ücret ödemeden kullanabilirsiniz.' },
            { q: 'Dosyalarım sistemde saklanıyor mu?', a: 'Hayır, gizliliğinize önem veriyoruz. İşlem bittikten kısa süre sonra tüm dosyalar sunucularımızdan silinir.' },
            { q: 'Günlük kullanım sınırı var mı?', a: 'Şu an için tüm kullanıcılarımıza cömert bir ücretsiz limit sunuyoruz.' }
        ];

        async function initSite() {
            let activeLang = 'en';
            try {
                const res = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const text = await res.text();
                const loc = text.split('\n').find(l => l.startsWith('loc='));
                if (loc) {
                    const code = loc.split('=')[1].trim();
                    if (countryToLangMap[code]) activeLang = countryToLangMap[code];
                    else {
                        const browser = (navigator.language || navigator.userLanguage).substring(0,2).toLowerCase();
                        if (languages[browser]) activeLang = browser;
                    }
                }
            } catch (e) {
                const browser = (navigator.language || navigator.userLanguage).substring(0,2).toLowerCase();
                if (languages[browser]) activeLang = browser;
            }

            document.documentElement.lang = activeLang;
            renderAll(activeLang);
        }

        function renderAll(lang) {
            const d = languages[lang] || languages.en;
            document.getElementById('hero-title').innerText = d.heroTitle;
            document.getElementById('hero-sub').innerText = d.heroSub;
            document.getElementById('search-input').placeholder = d.searchPlaceholder;
            document.getElementById('section-tools-title').innerText = d.toolsTitle;
            document.getElementById('section-cats-title').innerText = d.catsTitle;
            document.getElementById('section-faq-title').innerText = d.faqTitle;
            document.getElementById('no-results').innerText = d.noResults;

            renderTools(toolsData);

            const catGrid = document.getElementById('categories-grid');
            catGrid.innerHTML = '';
            categoriesData.forEach(c => {
                catGrid.innerHTML += `
                    <div class="p-4 bg-gray-900/20 border border-gray-800/60 rounded-xl text-center hover:bg-gray-900/50 transition-all cursor-pointer">
                        <div class="text-2xl mb-2">${c.icon}</div>
                        <div class="text-sm font-semibold text-gray-200">${c.name}</div>
                        <div class="text-xs text-gray-500 mt-1">${c.count} Tools</div>
                    </div>`;
            });

            const faqCont = document.getElementById('faq-container');
            faqCont.innerHTML = '';
            faqData.forEach((f, i) => {
                faqCont.innerHTML += `
                    <div class="bg-gray-900/30 border border-gray-800 rounded-xl overflow-hidden cursor-pointer" onclick="toggleFaq(${i})">
                        <div class="p-6 flex justify-between items-center select-none">
                            <h3 class="text-base font-semibold text-white flex items-center"><span class="text-indigo-400 mr-2">Q:</span> ${f.q}</h3>
                            <span id="faq-arrow-${i}" class="text-xl text-gray-500 transition-transform duration-200">▼</span>
                        </div>
                        <div id="faq-ans-${i}" class="px-6 pb-6 pt-2 border-t border-gray-800/50 bg-gray-900/10 hidden">
                            <p class="text-sm text-gray-400 pl-6">${f.a}</p>
                        </div>
                    </div>`;
            });
        }

        const grid = document.getElementById('tools-grid');
        function renderTools(list) {
            grid.innerHTML = '';
            if(list.length === 0) {
                document.getElementById('no-results').classList.remove('hidden');
                return;
            }
            document.getElementById('no-results').classList.add('hidden');
            list.forEach(t => {
                grid.innerHTML += `
                    <a href="tools/${t.slug}.html" class="group p-6 bg-gray-900/40 border border-gray-800/80 rounded-2xl hover:border-indigo-500/30 transition-all hover:bg-gray-900/70">
                        <div class="w-12 h-12 flex items-center justify-center text-2xl bg-gray-800/50 rounded-xl mb-4 group-hover:scale-110 transition-transform">${t.icon}</div>
                        <h3 class="text-lg font-semibold text-white mb-2 group-hover:text-indigo-400 transition-colors">${t.name}</h3>
                        <p class="text-sm text-gray-400">${t.desc}</p>
                    </a>`;
            });
        }

        function toggleFaq(i) {
            document.getElementById(`faq-ans-${i}`).classList.toggle('hidden');
            document.getElementById(`faq-arrow-${i}`).classList.toggle('rotate-180');
        }

        document.getElementById('search-input').addEventListener('input', function(e) {
            const q = e.target.value.toLowerCase();
            renderTools(toolsData.filter(t => t.name.toLowerCase().includes(q) || t.desc.toLowerCase().includes(q)));
        });

        initSite();
    </script>
</body>
</html>
