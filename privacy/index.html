    <script>
        const localizations = {
            en: {
                pageTitle: 'Privacy Policy - Toolcas',
                pageDescription: 'Learn how Toolcas handles website usage data, cookies, analytics and information processed through its online tools.',
                navHome: 'Home',
                navTools: 'Tools',
                navFaq: 'FAQ',
                breadcrumb: 'Privacy Policy',
                badge: 'Legal information',
                title: 'Privacy Policy',
                intro: 'This policy explains what information may be processed when you visit Toolcas or use its online tools.',
                date: 'Last updated: July 16, 2026',
                contactTitle: 'Questions about this policy?',
                contactText: 'Contact Toolcas if you have questions about privacy or the way information is handled.',
                terms: 'Terms',
                blog: 'Blog',
                rights: 'All rights reserved.',

                body: `
                    <p>
                        Toolcas respects the privacy of its visitors. This Privacy Policy explains what
                        information may be collected or processed when you visit the website and use
                        the available tools.
                    </p>

                    <h2>1. Information processed through tools</h2>

                    <p>
                        Some Toolcas tools may process text, code, JSON, images or other content that
                        you provide. The way information is handled can vary depending on the tool.
                    </p>

                    <p>
                        Tools that operate entirely inside your browser generally process content on
                        your device. Tools that rely on an external service or server may transmit the
                        submitted content to that service for processing.
                    </p>

                    <p>
                        Do not submit confidential, sensitive or personally identifiable information
                        unless the relevant tool clearly states that it is appropriate to do so.
                    </p>

                    <h2>2. Website analytics</h2>

                    <p>
                        Toolcas uses Google Analytics to understand how visitors use the website,
                        measure traffic and improve the platform. Google Analytics may process
                        information such as:
                    </p>

                    <ul>
                        <li>Pages visited and approximate visit duration</li>
                        <li>Browser, device and operating system information</li>
                        <li>General geographic or language information</li>
                        <li>Referring pages and interactions with the website</li>
                        <li>Online identifiers and cookie-related data</li>
                    </ul>

                    <p>
                        Information collected through Google Analytics is handled in accordance with
                        Google's own privacy terms and data practices.
                    </p>

                    <h2>3. Cookies and similar technologies</h2>

                    <p>
                        Toolcas and third-party services used by the website may use cookies or similar
                        technologies. These technologies can support analytics, remember preferences,
                        improve performance and help understand website usage.
                    </p>

                    <p>
                        You can control or delete cookies through your browser settings. Disabling
                        cookies may affect some website functions.
                    </p>

                    <h2>4. Server and security logs</h2>

                    <p>
                        The website hosting provider, security systems or content delivery services
                        may automatically record technical information such as IP address, request
                        time, browser details, requested pages and error information.
                    </p>

                    <p>
                        These logs may be used for security, abuse prevention, troubleshooting and
                        maintaining the operation of the website.
                    </p>

                    <h2>5. Third-party services</h2>

                    <p>
                        Toolcas may use third-party services for analytics, hosting, security, content
                        delivery or tool functionality. These services may process information under
                        their own privacy policies.
                    </p>

                    <h2>6. Data retention</h2>

                    <p>
                        Retention periods may vary depending on the type of information and the service
                        involved. Toolcas aims to retain information only for as long as reasonably
                        necessary for operation, security, analytics or legal requirements.
                    </p>

                    <h2>7. Your choices and rights</h2>

                    <p>
                        Depending on your location, you may have rights relating to your personal data,
                        such as requesting access, correction, deletion or restriction of processing.
                    </p>

                    <p>
                        You can also manage cookies through your browser and use available Google
                        privacy or analytics controls.
                    </p>

                    <h2>8. Children's privacy</h2>

                    <p>
                        Toolcas is not intended to knowingly collect personal information from children.
                        Children should not submit personal or sensitive information through the tools.
                    </p>

                    <h2>9. Changes to this policy</h2>

                    <p>
                        This Privacy Policy may be updated when the website, its tools or applicable
                        practices change. The latest revision date will be displayed at the top of this
                        page.
                    </p>

                    <h2>10. Contact</h2>

                    <p>
                        Questions regarding this Privacy Policy can be sent through the contact method
                        published on the Toolcas website.
                    </p>
                `
            },

            tr: {
                pageTitle: 'Gizlilik Politikası - Toolcas',
                pageDescription: 'Toolcas sitesinde kullanım verilerinin, çerezlerin, analitik bilgilerinin ve araçlar üzerinden işlenen verilerin nasıl ele alındığını öğrenin.',
                navHome: 'Ana Sayfa',
                navTools: 'Araçlar',
                navFaq: 'SSS',
                breadcrumb: 'Gizlilik Politikası',
                badge: 'Yasal bilgiler',
                title: 'Gizlilik Politikası',
                intro: 'Bu politika, Toolcas sitesini ziyaret ettiğinizde veya çevrim içi araçları kullandığınızda hangi bilgilerin işlenebileceğini açıklar.',
                date: 'Son güncelleme: 16 Temmuz 2026',
                contactTitle: 'Bu politika hakkında sorunuz mu var?',
                contactText: 'Gizlilik veya bilgilerin nasıl işlendiğiyle ilgili sorularınız için Toolcas ile iletişime geçebilirsiniz.',
                terms: 'Kullanım Koşulları',
                blog: 'Blog',
                rights: 'Tüm hakları saklıdır.',

                body: `
                    <p>
                        Toolcas, ziyaretçilerinin gizliliğine saygı duyar. Bu Gizlilik Politikası,
                        siteyi ziyaret ettiğinizde ve mevcut araçları kullandığınızda hangi bilgilerin
                        toplanabileceğini veya işlenebileceğini açıklar.
                    </p>

                    <h2>1. Araçlar üzerinden işlenen bilgiler</h2>

                    <p>
                        Bazı Toolcas araçları sağladığınız metin, kod, JSON, görsel veya diğer içerikleri
                        işleyebilir. Bilgilerin işlenme şekli kullanılan araca göre değişebilir.
                    </p>

                    <p>
                        Tamamen tarayıcı içerisinde çalışan araçlar genellikle içeriği cihazınızda işler.
                        Harici bir hizmete veya sunucuya bağlı çalışan araçlar ise gönderilen içeriği
                        işlenmesi amacıyla ilgili hizmete iletebilir.
                    </p>

                    <p>
                        İlgili araç açıkça uygun olduğunu belirtmediği sürece gizli, hassas veya kişisel
                        olarak tanımlanabilir bilgiler göndermeyin.
                    </p>

                    <h2>2. Site analitiği</h2>

                    <p>
                        Toolcas, ziyaretçilerin siteyi nasıl kullandığını anlamak, trafiği ölçmek ve
                        platformu geliştirmek amacıyla Google Analytics kullanır. Google Analytics
                        aşağıdaki türde bilgileri işleyebilir:
                    </p>

                    <ul>
                        <li>Ziyaret edilen sayfalar ve yaklaşık ziyaret süresi</li>
                        <li>Tarayıcı, cihaz ve işletim sistemi bilgileri</li>
                        <li>Genel konum veya dil bilgileri</li>
                        <li>Yönlendiren sayfalar ve siteyle gerçekleştirilen etkileşimler</li>
                        <li>Çevrim içi tanımlayıcılar ve çerezlerle ilişkili veriler</li>
                    </ul>

                    <p>
                        Google Analytics aracılığıyla toplanan bilgiler Google'ın kendi gizlilik
                        koşulları ve veri uygulamaları kapsamında işlenir.
                    </p>

                    <h2>3. Çerezler ve benzer teknolojiler</h2>

                    <p>
                        Toolcas ve site üzerinde kullanılan üçüncü taraf hizmetler çerezlerden veya
                        benzer teknolojilerden yararlanabilir. Bu teknolojiler analitik ölçüm yapılması,
                        tercihlerin hatırlanması, performansın geliştirilmesi ve site kullanımının
                        anlaşılması amacıyla kullanılabilir.
                    </p>

                    <p>
                        Çerezleri tarayıcı ayarlarınızdan kontrol edebilir veya silebilirsiniz.
                        Çerezlerin devre dışı bırakılması bazı site işlevlerini etkileyebilir.
                    </p>

                    <h2>4. Sunucu ve güvenlik kayıtları</h2>

                    <p>
                        Siteyi barındıran hizmet sağlayıcı, güvenlik sistemleri veya içerik dağıtım
                        hizmetleri; IP adresi, istek zamanı, tarayıcı bilgileri, istenen sayfalar ve
                        hata bilgileri gibi teknik verileri otomatik olarak kaydedebilir.
                    </p>

                    <p>
                        Bu kayıtlar güvenlik, kötüye kullanımın önlenmesi, hata giderme ve sitenin
                        çalışmasının sürdürülmesi amacıyla kullanılabilir.
                    </p>

                    <h2>5. Üçüncü taraf hizmetler</h2>

                    <p>
                        Toolcas; analitik, barındırma, güvenlik, içerik dağıtımı veya araç işlevleri
                        için üçüncü taraf hizmetlerden yararlanabilir. Bu hizmetler bilgileri kendi
                        gizlilik politikaları doğrultusunda işleyebilir.
                    </p>

                    <h2>6. Verilerin saklanma süresi</h2>

                    <p>
                        Saklama süreleri bilgi türüne ve kullanılan hizmete göre değişebilir. Toolcas,
                        bilgileri yalnızca işletim, güvenlik, analitik veya yasal gereklilikler için
                        makul ölçüde gerekli olduğu sürece saklamayı amaçlar.
                    </p>

                    <h2>7. Tercihleriniz ve haklarınız</h2>

                    <p>
                        Bulunduğunuz ülkeye göre kişisel verilerinize ilişkin erişim, düzeltme, silme
                        veya işlemenin sınırlandırılmasını isteme gibi haklara sahip olabilirsiniz.
                    </p>

                    <p>
                        Ayrıca tarayıcınız üzerinden çerezleri yönetebilir ve Google tarafından sunulan
                        gizlilik veya analitik kontrollerinden yararlanabilirsiniz.
                    </p>

                    <h2>8. Çocukların gizliliği</h2>

                    <p>
                        Toolcas, çocuklardan bilerek kişisel bilgi toplamak amacıyla tasarlanmamıştır.
                        Çocuklar araçlar üzerinden kişisel veya hassas bilgi göndermemelidir.
                    </p>

                    <h2>9. Politikadaki değişiklikler</h2>

                    <p>
                        Bu Gizlilik Politikası; site, araçlar veya kullanılan uygulamalar değiştiğinde
                        güncellenebilir. En son güncelleme tarihi bu sayfanın üst kısmında gösterilir.
                    </p>

                    <h2>10. İletişim</h2>

                    <p>
                        Bu Gizlilik Politikasıyla ilgili sorular Toolcas sitesinde yayımlanan iletişim
                        yöntemi üzerinden iletilebilir.
                    </p>
                `
            }
        };

        function detectLanguage() {
            const languages = navigator.languages && navigator.languages.length
                ? navigator.languages
                : [navigator.language || navigator.userLanguage || 'en'];

            return languages.some(lang =>
                String(lang).toLowerCase().startsWith('tr')
            ) ? 'tr' : 'en';
        }

        function renderPrivacy(lang) {
            const data = localizations[lang] || localizations.en;

            document.documentElement.lang = lang;
            document.title = data.pageTitle;

            const description = document.querySelector('meta[name="description"]');

            if (description) {
                description.setAttribute('content', data.pageDescription);
            }

            document.querySelectorAll('[data-i18n]').forEach(element => {
                const key = element.dataset.i18n;

                if (data[key]) {
                    element.textContent = data[key];
                }
            });

            document.getElementById('policy-title').textContent = data.title;
            document.getElementById('policy-intro').textContent = data.intro;
            document.getElementById('policy-date').textContent = data.date;
            document.getElementById('policy-body').innerHTML = data.body;
        }

        document.getElementById('current-year').textContent = new Date().getFullYear();

        renderPrivacy(detectLanguage());
    </script>
