    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - Toolcas</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-bg { background-color: #0b0f19; }
    </style>
</head>
<body class="glow-bg text-gray-100 font-sans antialiased relative min-h-screen">

    <!-- Arka Plan Modern Blur Efekti -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[400px] pointer-events-none overflow-hidden opacity-20 z-0">
        <div class="absolute top-[-10%] left-[40%] w-[450px] h-[450px] bg-indigo-600 rounded-full blur-[130px]"></div>
    </div>

    <!-- Üst Menü (Navbar) -->
    <header class="relative z-10 border-b border-gray-800/80 bg-[#0b0f19]/70 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="../index.html" class="text-2xl font-black tracking-tight text-white bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">
                TOOLCAS
            </a>
            <nav class="space-x-6 text-sm font-medium text-gray-400">
                <a href="../index.html" id="nav-home" class="hover:text-white transition-colors">Home</a>
            </nav>
        </div>
    </header>

    <!-- Yasal Metin İçeriği -->
    <main class="relative z-10 max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pt-16 pb-24">
        <h1 id="policy-title" class="text-3xl font-extrabold text-white tracking-tight mb-4"></h1>
        <p id="policy-date" class="text-xs text-gray-500 mb-8 border-b border-gray-900 pb-4"></p>
        
        <div id="policy-body" class="text-gray-400 text-sm leading-relaxed space-y-6"></div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-900 bg-[#070a12] text-xs text-gray-500 py-8 text-center relative z-10">
        &copy; 2026 Toolcas Inc. All rights reserved.
    </footer>

    <!-- DİL VE METİN YÖNETİM MOTORU -->
    <script>
        const localizations = {
            en: {
                navHome: 'Home',
                title: 'Privacy Policy',
                date: 'Last updated: July 12, 2026',
                body: `
                    <p>At Toolcas, accessible from our platform, one of our main priorities is the privacy of our visitors. This Privacy Policy document contains types of information that is collected and recorded by Toolcas and how we use it.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">1. Zero-Retention Data Processing</h2>
                    <p>When you use our web-based tools, such as the Background Remover, all image processing occurs instantly in volatile memory (RAM). We maintain a strict zero-retention policy: your uploaded assets are never written to physical disks, permanently stored, or shared with third parties. Once the output is generated and delivered to your browser, it is instantly wiped from existence.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">2. Log Files and Analytics</h2>
                    <p>Toolcas follows a standard procedure of using log files. These files log visitors when they visit websites. The information collected by log files includes internet protocol (IP) addresses, browser type, Internet Service Provider (ISP), date and time stamp, and referring/exit pages. These are not linked to any information that is personally identifiable.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">3. Cookies</h2>
                    <p>Like any other website, Toolcas uses 'cookies'. These cookies are used to store information including visitors' preferences, and the pages on the website that the visitor accessed or visited. The information is used to optimize the users' experience by customizing our web page content based on visitors' browser type and/or other information.</p>
                `
            },
            tr: {
                navHome: 'Ana Sayfa',
                title: 'Gizlilik Politikası',
                date: 'Son güncelleme: 12 Temmuz 2026',
                body: `
                    <p>Platformumuz üzerinden erişilebilen Toolcas'te, ana önceliklerimizden biri ziyaretçilerimizin gizliliğidir. Bu Gizlilik Politikası belgesi, Toolcas tarafından toplanan ve kaydedilen bilgi türlerini ve bunları nasıl kullandığımızı içerir.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">1. Sıfır Depolama (Zero-Retention) ile Veri İşleme</h2>
                    <p>Arka Plan Silici gibi web tabanlı araçlarimizi kullandiğinizda, tüm görsel işleme işlemleri anlik olarak geçici bellekte (RAM) gerçekleşir. Kesin bir sıfır depolama politikası uyguluyoruz: yüklediğiniz varlıklar asla fiziksel disklere yazılmaz, kalıcı olarak saklanmaz veya üçüncü taraflarla paylaşılmaz. Çıktı üretilip tarayıcınıza iletildiği an, sistemden tamamen yok edilir.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">2. Günlük Dosyaları ve Analitik</h2>
                    <p>Toolcas, günlük dosyaları (log files) kullanımında standart bir prosedür izler. Bu dosyalar ziyaretçileri web sitelerini ziyaret ettiklerinde kaydeder. Toplanan bilgilere internet protokolü (IP) adresleri, tarayıcı türü, İnternet Servis Sağlayıcısı (ISP), tarih ve saat damgası ile yönlendirme/çıkış sayfaları dahildir. Bunlar kişisel olarak tanımlanabilir herhangi bir bilgiyle bağlantılı değildir.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">3. Çerezler (Cookies)</h2>
                    <p>Diğer tüm web siteleri gibi Toolcas de 'çerezler' kullanır. Bu çerezler, ziyaretçilerin tercihleri ve web sitesinde eriştikleri veya ziyaret ettikleri sayfalar dahil olmak üzere bilgileri depolamak için kullanılır. Bu bilgiler, web sayfası içeriğimizi ziyaretçilerin tarayıcı türüne ve/veya diğer bilgilere göre özelleştirerek kullanıcı deneyimini optimize etmek için kullanılır.</p>
                `
            }
        };

        async function initPrivacy() {
            let activeLang = 'en';
            try {
                const response = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const text = await response.text();
                const locLine = text.split('\n').find(line => line.startsWith('loc='));
                if (locLine) {
                    const country = locLine.split('=')[1].trim();
                    if (country === 'TR') activeLang = 'tr';
                    else {
                        const browserLang = (navigator.language || navigator.userLanguage).substring(0,2).toLowerCase();
                        if (localizations[browserLang]) activeLang = browserLang;
                    }
                }
            } catch (e) {
                const browserLang = (navigator.language || navigator.userLanguage).substring(0,2).toLowerCase();
                if (localizations[browserLang]) activeLang = browserLang;
            }

            document.documentElement.lang = activeLang;
            renderPrivacy(activeLang);
        }

        function renderPrivacy(lang) {
            const data = localizations[lang] || localizations.en;

            document.getElementById('nav-home').innerText = data.navHome;
            document.getElementById('policy-title').innerText = data.title;
            document.getElementById('policy-date').innerText = data.date;
            document.getElementById('policy-body').innerHTML = data.body;
        }

        initPrivacy();
    </script>
</body>
</html>
