<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service - Toolcas</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .glow-bg { background-color: #0b0f19; }
    </style>
</head>
<body class="glow-bg text-gray-100 font-sans antialiased relative min-h-screen">

    <!-- Arka Plan Modern Blur Efekti -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-full max-w-7xl h-[400px] pointer-events-none overflow-hidden opacity-20 z-0">
        <div class="absolute top-[-10%] left-[40%] w-[450px] h-[450px] bg-purple-600 rounded-full blur-[130px]"></div>
    </div>

    <!-- Üst Menü (Navbar) -->
    <header class="relative z-10 border-b border-gray-800/80 bg-[#0b0f19]/70 backdrop-blur-md sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
            <a href="../index.html" class="text-2xl font-black tracking-tight text-white bg-gradient-to-r from-indigo-400 to-purple-400 bg-clip-text text-transparent">

    </header>

    <!-- Yasal Metin İçeriği -->
    <main class="relative z-10 max-w-3xl mx-auto px-4 sm:px-6 lg:px-8 pt-16 pb-24">
        <h1 id="terms-title" class="text-3xl font-extrabold text-white tracking-tight mb-4"></h1>
        <p id="terms-date" class="text-xs text-gray-500 mb-8 border-b border-gray-900 pb-4"></p>
        
        <div id="terms-body" class="text-gray-400 text-sm leading-relaxed space-y-6"></div>
    </main>

    <!-- Footer -->
    <footer class="border-t border-gray-900 bg-[#070a12] text-xs text-gray-500 py-8 text-center relative z-10">
        &copy; 2026 Toolcas Inc. All rights reserved.
    </footer>

    <!-- DİL VE METİN YÖNETİM MOTORU -->
    <script>
        const localizations = {
            en: {
                navHome: 'Home',
                title: 'Terms of Service',
                date: 'Last updated: July 12, 2026',
                body: `
                    <p>Welcome to Toolcas. By accessing or using our platform, you agree to be bound by these Terms of Service. If you do not agree to all of these terms, please do not use our services.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">1. Use of the Services</h2>
                    <p>Toolcas provides web-based AI utility tools for individual and commercial purposes. You agree to use these services only for lawful intents and in accordance with all local, national, and international laws. You must not attempt to disrupt, exploit, or reverse-engineer the core network pipelines of our platform.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">2. Intellectual Property Rights</h2>
                    <p>All output assets generated by our web utilities (such as transparent background outputs) belong entirely to you. You hold full ownership and commercial rights over your processed items. Toolcas claims no rights or data privileges over the media you input into our memory models.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">3. Limitation of Liability</h2>
                    <p>Toolcas is provided on an "as is" and "as available" basis. We do not guarantee that the services will always be error-free, uninterrupted, or perfectly compatible with all image qualities. We are not liable for any direct, indirect, or incidental losses resulting from service downtime or processing variances.</p>
                `
            },
            tr: {
                navHome: 'Ana Sayfa',
                title: 'Kullanım Şartları',
                date: 'Son güncelleme: 12 Temmuz 2026',
                body: `
                    <p>Toolcas'e hoş geldiniz. Platformumuza erişerek veya platformumuzu kullanarak bu Kullanım Şartları'na bağlı kalmayı kabul etmiş olursunuz. Bu şartların tamamını kabul etmiyorsanız, lütfen hizmetlerimizi kullanmayın.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">1. Hizmetlerin Kullanımı</h2>
                    <p>Toolcas, bireysel ve ticari amaçlar için web tabanlı yapay zeka araçları sunar. Bu hizmetleri yalnızca yasal amaçlarla ve tüm yerel, ulusal ve uluslararası yasalara uygun olarak kullanmayı kabul edersiniz. Platformumuzun çekirdek ağ hatlarını kesintiye uğratmaya, kötüye kullanmaya veya tersine mühendislik yapmaya çalışmamalısınız.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">2. Fikri Mülkiyet Hakları</h2>
                    <p>Web araçlarımız tarafından üretilen tüm çıktı varlıkları (şeffaf arka plan çıktıları gibi) tamamen size aittir. İşlenen öğeleriniz üzerinde tam sahiplik ve ticari haklara sahipsiniz. Toolcas, bellek modellerimize girdiğiniz medya üzerinde hiçbir hak veya veri ayrıcalığı talep etmez.</p>
                    
                    <h2 class="text-lg font-bold text-white mt-6 mb-2">3. Sorumluluğun Sınırlandırılması</h2>
                    <p>Toolcas, "olduğu gibi" ve "mevcut olduğu sürece" esasına göre sunulmaktadır. Hizmetlerin her zaman hatasız, kesintisiz veya tüm görsel kaliteleriyle mükemmel şekilde uyumlu olacağını garanti etmeyiz. Hizmet kesintilerinden veya işleme farklılıklarından kaynaklanan doğrudan, dolaylı veya arızi kayıplardan sorumlu değiliz.</p>
                `
            }
        };

        async function initTerms() {
            let activeLang = 'en';
            try {
                const response = await fetch('https://1.1.1.1/cdn-cgi/trace');
                const text = await response.text();
                const locLine = text.split('\n').find(line => line.startsWith('loc='));
                if (locLine) {
                    const country = locLine.split('=')[1].trim();
                    if (country === 'TR') activeLang = 'tr';
                    else {
                        const browserLang = (navigator.language || navigator.userLanguage).substring(0,2).toLowerCase();
                        if (localizations[browserLang]) activeLang = browserLang;
                    }
                }
            } catch (e) {
                const browserLang = (navigator.language || navigator.userLanguage).substring(0,2).toLowerCase();
                if (localizations[browserLang]) activeLang = browserLang;
            }

            document.documentElement.lang = activeLang;
            renderTerms(activeLang);
        }

        function renderTerms(lang) {
            const data = localizations[lang] || localizations.en;

            document.getElementById('nav-home').innerText = data.navHome;
            document.getElementById('terms-title').innerText = data.title;
            document.getElementById('terms-date').innerText = data.date;
            document.getElementById('terms-body').innerHTML = data.body;
        }

        initTerms();
    </script>
</body>
</html>
